schema_version: '1.0'
experiment_name: section15_tuning_optimization_12e
seed: 2026
device: cpu
pretraining_gate:
  report: reports/evidence/pretraining_gate_report.json
  required_status: PASS
matrix:
  tasks:
  - selective_copy
  - associative_recall
  - distractor_heavy_retrieval
  train_sequence_length: 256
  evaluation_sequence_lengths:
  - 1024
  memory_budgets:
  - 16
  - 32
  models:
  - budgetmem_r
model:
  vocabulary_size: 192
  embedding_dim: 32
  hidden_dim: 64
  key_dim: 32
  retrieval_k: 4
  max_target_length: 12
  dropout: 0.0
training:
  train_samples: 384
  validation_samples: 96
  batch_size: 8
  epochs: 12
  learning_rate: 0.0005
  weight_decay: 0.0001
  gradient_clip_norm: 1.0
  maximum_acceptable_gradient_norm: 100.0
  budget_sampling: alternating
  write_rate_target: 0.1
  write_rate_penalty: 0.5
  budget_violation_penalty: 10.0
  num_workers: 0
  write_threshold: 0.5
  write_temperature: 0.67
  write_binarization_penalty: 0.01
evaluation:
  batch_size: 8
  deterministic: true
  recent_overlap_failure_threshold: 0.9
  nontrivial_write_frequency_min: 0.01
  nontrivial_write_frequency_max: 0.95
  random_retention_margin: 0.01
  minimum_clear_accuracy_gain: 0.02
  long_range_sequence_length: 1024
  resource_sample_interval_seconds: 0.01
artifacts:
  output_root: outputs/pilot_performance_tuning/optimization_12e
  results_csv: reports/tables/pilot_tuning/optimization_12e_results.csv
  summary_json: reports/evidence/pilot_tuning/optimization_12e_summary.json
  gate_json: reports/evidence/pilot_tuning/optimization_12e_gate.json
  report_markdown: reports/optimization_12e_report.md
  checkpoint_root: outputs/pilot_performance_tuning/optimization_12e/checkpoints
